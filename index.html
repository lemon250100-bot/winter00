<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDIO.ELITE - 語言學習與考卷筆記</title>
    <style>
        :root { 
            --primary: #FF4F00; 
            --bg: #0b1120; 
            --sb-bg: #1e293b; 
            --paper: #ffffff; 
            --sb-w: 320px; 
            --tb-h: 75px; 
        }
        * { 
            box-sizing: border-box; 
            outline: none; 
        }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw; 
            overflow: hidden; 
            background: var(--bg); 
            font-family: 'Inter', system-ui, sans-serif; 
            display: flex; 
            color: white; 
        }

        /* --- 側邊欄佈局 --- */
        #sidebar { 
            width: var(--sb-w); 
            height: 100vh; 
            background: var(--sb-bg); 
            border-right: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
        }
        .sb-header { 
            padding: 35px 25px 15px; 
        }
        .logo { 
            font-size: 1.6rem; 
            font-weight: 900; 
        }
        .logo span { 
            color: var(--primary); 
        }
        .sb-search-wrap { 
            padding: 0 15px 15px; 
        }
        #sb-search { 
            width: 100%; 
            padding: 10px; 
            border-radius: 8px; 
            background: rgba(0,0,0,0.2); 
            color: white; 
            border: 1px solid #444; 
            font-size: 0.85rem; 
        }
        .sb-nav { 
            display: flex; 
            gap: 10px; 
            padding: 0 15px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .btn-sb { 
            flex: 1; 
            padding: 12px; 
            background: rgba(255,255,255,0.08); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.8rem; 
            font-weight: bold; 
            text-align: center; 
            transition: all 0.2s;
        }
        .btn-sb:hover { 
            background: var(--primary); 
        }
        #explorer { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            scrollbar-width: thin; 
            scrollbar-color: var(--primary) transparent; 
        }
        
        .f-box { 
            margin-bottom: 25px; 
            border: 2px solid transparent; 
            transition: 0.3s; 
            padding: 5px;
            border-radius: 8px;
        }
        .f-box.drag-over { 
            border-color: var(--primary); 
            border-style: dashed; 
            background: rgba(255,79,0,0.1); 
        }
        .f-head { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 10px; 
        }
        .f-input { 
            background: transparent; 
            border: none; 
            color: white; 
            font-weight: bold; 
            font-size: 1rem; 
            width: 70%; 
            border-bottom: 1px solid transparent; 
        }
        .f-input:focus {
            border-bottom-color: var(--primary);
        }
        .n-list { 
            margin-left: 15px; 
            border-left: 1px dashed #444; 
            padding-left: 10px; 
        }
        .n-item { 
            padding: 10px; 
            margin: 4px 0; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 0.9rem; 
            color: #94a3b8; 
            cursor: grab; 
            background: rgba(255,255,255,0.02); 
        }
        .n-item.active { 
            background: rgba(255, 79, 0, 0.2); 
            color: var(--primary); 
            font-weight: bold; 
        }
        .n-input { 
            background: transparent; 
            border: none; 
            color: inherit; 
            font-size: inherit; 
            width: 80%; 
        }
        .btn-del { 
            opacity: 0.3; 
            cursor: pointer; 
            color: white; 
            background: none; 
            border: none; 
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-del:hover { 
            opacity: 1; 
            color: #ff4d4d; 
        }

        /* --- 主區域與工具列 --- */
        #main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            position: relative; 
        }
        #toolbar { 
            height: var(--tb-h); 
            background: rgba(15, 23, 42, 0.95); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            align-items: center; 
            padding: 0 25px; 
            gap: 12px; 
            z-index: 100; 
        }
        .tool-grp { 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            border-right: 1px solid #444; 
            padding-right: 12px; 
        }
        .btn-t { 
            width: 38px; 
            height: 38px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #222; 
            color: white; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: background 0.2s;
        }
        .btn-t:hover { 
            background: var(--primary); 
        }
        .save-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-left: auto; 
        }

        #canvas { 
            flex: 1; 
            overflow-y: auto; 
            padding: 50px 0 400px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 40px; 
        }
        .paper-page { 
            width: 820px; 
            min-height: 1160px; 
            max-height: 1160px; 
            background: white; 
            color: #1e293b; 
            padding: 80px 100px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.6); 
            outline: none; 
            line-height: 1.8; 
            font-size: 1.15rem; 
            position: relative; 
            word-wrap: break-word; 
            overflow: hidden; 
            transition: background 0.3s, color 0.3s; 
        }
        .paper-page::after { 
            content: "Page " attr(data-page); 
            position: absolute; 
            bottom: 30px; 
            right: 40px; 
            font-size: 0.8rem; 
            color: #ddd; 
            font-style: italic; 
        }

        /* --- 智慧泡泡 --- */
        #bubble { 
            display: none; 
            position: absolute; 
            background: #0f172a; 
            color: white; 
            border-radius: 50px; 
            padding: 8px 15px; 
            z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            align-items: center; 
            gap: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        .btn-b { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 6px 18px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: bold; 
            cursor: pointer; 
        }

        @media print { 
            #sidebar, #toolbar, #bubble { display: none !important; } 
            #canvas { padding: 0 !important; } 
            .paper-page { box-shadow: none !important; page-break-after: always !important; } 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin: 20px 0; 
            border: 1px solid #ddd; 
            table-layout: fixed; 
        }
        td { 
            padding: 12px; 
            border: 1px solid #ddd; 
            color: inherit; 
            word-break: break-all; 
            min-height: 1.5em; 
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sb-header"><div class="logo">STUDIO<span>.ELITE</span></div></div>
        <div class="sb-search-wrap"><input type="text" id="sb-search" placeholder="🔍 搜尋標題..." oninput="searchNote(this.value)"></div>
        <div class="sb-nav">
            <button class="btn-sb" onclick="addFolder()">📁 +資料夾</button>
            <button class="btn-sb" onclick="addNote()">📄 +新章節</button>
        </div>
        <div id="explorer"></div> 
<div class="sb-footer" style="padding: 10px 15px;">
            <button class="btn-sb" style="width:100%; background:#8b5cf6; margin-bottom:8px;" onclick="toggleGameCenter()">🎮 語言遊戲中心</button>
            <button class="btn-sb" style="width:100%" onclick="exportJSON()">💾 備份 JSON 檔案</button>
        </div>
    </aside>

  <main id="main">
        <header id="toolbar">
            <div class="tool-grp">
                <button class="btn-t" onclick="exec('undo')">↶</button>
                <button class="btn-t" onclick="exec('redo')">↷</button>
                <button class="btn-t" onclick="exec('bold')">B</button>
                <button class="btn-t" onclick="exec('hiliteColor', '#fef08a')">🖍️</button>
                <button class="btn-t" onclick="insertTable()" title="插入表格">📅</button>
            </div>
            <button class="btn-sb" style="background:#059669; width:100px; border:none;" onclick="window.print()">🖨️ PDF</button>
            <button class="save-btn" id="save-status" onclick="save()">儲存內容</button>
        </header>

        <section id="canvas">
            <!-- 遊戲中心主容器 -->
            <div id="game-center" style="display:none; width: 820px; background: #1e293b; border-radius: 12px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: white; margin-bottom: 20px;">
                <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span>📅 <span id="checkin-status">今日尚未簽到</span></span>
                        <span id="streak-badge" style="margin-left:10px; background:#ef4444; padding:2px 8px; border-radius:12px; font-size:0.75rem; font-weight:bold; display:none;">🔥 連續 0 天</span>
                        <span style="margin-left:15px; background:#f59e0b; color:#0f172a; padding:4px 12px; border-radius:20px; font-weight:bold;">💰 金幣: <span id="user-coins">0</span></span>
                    </div>
                    <button class="btn-sb" id="btn-checkin" style="background:#059669; max-width:120px;" onclick="doCheckin()">每日簽到</button>
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button class="btn-sb" onclick="switchTab('play')">🕹️ 開始遊玩</button>
                    <button class="btn-sb" onclick="switchTab('import')">📥 匯入題目</button>
                    <button class="btn-sb" style="background:#e11d48;" onclick="switchTab('wrong')">📕 錯題本 (<span id="wrong-count">0</span>)</button>
                    <button class="btn-sb" style="background:#d97706;" onclick="switchTab('achieve')">🏅 成就系統</button>
                    <button class="btn-sb" style="background:#10b981;" onclick="switchTab('shop')">🏪 金幣商店</button>
                </div>
                
                <div id="g-tab-import" style="display: none;">
                    <h3>📥 極簡化題庫匯入</h3>
                    <p style="font-size:0.8rem; color:#94a3b8; margin-bottom:10px;">貼入純文字即可！格式：題目 | 正確答案 | 選項1(選填) | 選項2(選填) | 選項3(選填)</p>
                    <textarea id="import-json-area" style="width: 100%; height: 180px; background: #0f172a; color: #34d399; border: 1px solid #444; border-radius: 8px; padding: 10px; font-family: monospace;" placeholder="範例：
荷文第一章
今天天氣好嗎？ | 好 | 不好 | 非常好 | 差
爸爸去哪裡？ | 工廠

韓文基礎
謝謝的韓文 | 고맙습니다"></textarea>
                    <button class="btn-sb" style="background:var(--primary); margin-top:10px;" onclick="importQuestions()">確認解譯並匯入</button>
                </div>
                
                <div id="g-tab-play">
                    <h3>🎯 勾選遊玩小單元 (可複選)</h3>
                    <div id="game-chapter-list" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;"></div>
                    <button class="btn-sb" style="background:#2563eb; width:100%; font-size:1.1rem; padding:12px;" onclick="startGame(false)">🚀 開始單元測驗</button>
                    
                    <div id="game-playground" style="display:none; margin-top:20px; background:#0f172a; border-radius:8px; padding:20px; border:1px solid #334155;">
                        <div style="display:flex; justify-content:space-between; color:#94a3b8; margin-bottom:15px;"><span id="g-progress">題目：0 / 0</span><span id="g-score">得分：0</span></div>
                        <div id="g-q-text" style="font-size:1.2rem; font-weight:bold; margin-bottom:15px;"></div>
                        <div id="game-answer-zone"></div>
                        <button class="btn-sb" id="g-next-btn" style="background:var(--primary); margin-top:15px; display:none;" onclick="nextQuestion()">下一題 ➔</button>
                    </div>
                </div>

                <div id="g-tab-wrong" style="display: none;">
                    <h3>📕 自動錯題累積本</h3>
                    <div id="wrong-notice-box" style="background:rgba(225,29,72,0.1); border:1px solid #e11d48; padding:15px; border-radius:8px; margin-bottom:15px; text-align:center;">
                        目前錯題累計數：<b style="color:#f43f5e; font-size:1.2rem;" id="wrong-notice-num">0</b> / 10 題。<br>
                        <span id="wrong-lock-text" style="font-size:0.85rem; color:#fda4af;">⚠️ 錯題本必須累積滿 10 題以上，才能解鎖開啟地獄複清模式！</span>
                    </div>
                    <button class="btn-sb" id="btn-start-wrong" style="background:#e11d48; width:100%; padding:12px; font-size:1.1rem; display:none;" onclick="startGame(true)">🔥 開啟錯題魔鬼複習 (答對自動消去)</button>
                </div>
                
                <div id="g-tab-achieve" style="display: none;">
                    <h3>🏅 階梯式成就榜</h3>
                    <div id="achievement-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
                </div>
                
                <div id="g-tab-shop" style="display: none;">
                    <h3>🏪 補給站 & 隱藏外觀</h3>
                    <div id="shop-item-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
                </div>
            </div>

            <!-- A4 筆記紙張 -->
            <div id="pages"></div>
        </section>

        <div id="bubble">
            <button class="btn-b" id="btn-speak">🔊 朗讀發音</button>
            <button onclick="hideBubble()" style="background:none; border:none; color:#555; cursor:pointer; margin-left: 5px;">✕</button>
        </div>
    </main>

    <script>
        // --- 1. 全域資料庫宣告 ---
        let db = JSON.parse(localStorage.getItem('dutch_studio_drag_fix')) || {
            folders: [{ id: 1, name: "我的韓荷筆記", notes: ["第一章：起始"], open: true }],
            notes: { "第一章：起始": [""] }
        };
        let gameData = (function() {
            try {
                let saved = localStorage.getItem('studio_game_data');
                if (saved) {
                    let parsed = JSON.parse(saved);
                    if (parsed && typeof parsed === 'object') {
                        // 如果讀取出來的Coins是0或不存在，給予基礎值防護
                        if (parsed.coins === undefined) { parsed.coins = 100; }
                        return parsed;
                    }
                }
            } catch (e) {
                console.error("讀取儲存資料失敗:", e);
            }
            return {
                checkinLog: {}, 
                questions: {}, 
                totalCheckins: 0, 
                totalCorrect: 0, 
                unlockedAchievements: {}, 
                claimedAchievements: {}, 
                coins: 100, 
                items: { eraser: 1, glasses: 0 }, 
                unlockedThemes: { default: true }, 
                currentTheme: 'default',
                streak: 0, 
                lastCheckinDate: '', 
                wrongAnswers: [],
                maxSingleScore: 0
            };
        })();


        // 確保防護快取欄位安全存在
        if (!gameData.unlockedAchievements) gameData.unlockedAchievements = {};
        if (!gameData.claimedAchievements) gameData.claimedAchievements = {};
        if (!gameData.wrongAnswers) gameData.wrongAnswers = [];
        if (!gameData.items) gameData.items = { eraser: 1, glasses: 0 };
        if (!gameData.unlockedThemes) gameData.unlockedThemes = { default: true };
        if (!gameData.questions) gameData.questions = {};

        let curN = Object.keys(db.notes)[0] || "第一章：起始";
        let autosaveTimer;
        let selectedText = "";
        let dragN = null;
        let dragF = null;
        let currentPool = [];
        let curQIdx = 0;
        let score = 0;
        let gameMode = false;
        let isWrongReviewMode = false;
        
        const pgContainer = document.getElementById('pages');
        const bubble = document.getElementById('bubble');
        // 5大成就任務配置 (明確宣告指標函數與對象)
                // --- 6. 豪華終極版：105 條階梯式成就任務配置 (絕不簡化、5的倍數精準給獎、去除每日2次錯誤語句) ---
        const ACHIEVEMENTS = [
            // === 【超簡單入門組：獎勵 5 ~ 25 金幣】 ===
            { id: 'a_001', name: '🌱 新手啟航', desc: '在遊戲中累計答對 1 題', r: 5, target: 1, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_002', name: '📅 踏出第一步', desc: '不限天數累計完成簽到 1 次', r: 5, target: 1, cur: function(d) { return d.totalCheckins || 0; } },
            { id: 'a_004', name: '📄 筆記入門', desc: '在筆記區建立任意小章節', r: 5, target: 1, cur: function(d) { return Object.keys(db.notes).length || 0; } },
            { id: 'a_005', name: '🧠 小試身手', desc: '在遊戲中累計答對 2 題', r: 10, target: 2, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_006', name: '📅 習慣養成', desc: '不限天數累計完成簽到 2 次', r: 10, target: 2, cur: function(d) { return d.totalCheckins || 0; } },
            { id: 'a_007', name: '🔥 穩定加溫', desc: '達成連續登入簽到 2 天', r: 10, target: 2, cur: function(d) { return d.streak || 0; } },
            { id: 'a_008', name: '🧠 渐入佳境', desc: '在遊戲中累計答對 3 題', r: 15, target: 3, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_009', name: '🧠 基礎紮實', desc: '在遊戲中累計答對 4 題', r: 15, target: 4, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_010', name: '🧠 五福臨門', desc: '在遊戲中累計答對 5 題', r: 20, target: 5, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_011', name: '📅 勤奮學子', desc: '不限天數累計完成簽到 3 次', r: 20, target: 3, cur: function(d) { return d.totalCheckins || 0; } },
            { id: 'a_012', name: '🔥 欲罷不能', desc: '達成連續登入簽到 3 天', r: 25, target: 3, cur: function(d) { return d.streak || 0; } },
            { id: 'a_013', name: '🪙 初次致富', desc: '錢包中的金幣數量累計達到 150 枚', r: 25, target: 150, cur: function(d) { return d.coins || 0; } },
            { id: 'a_014', name: '🧠 單字工兵', desc: '在遊戲中累計答對 6 題', r: 25, target: 6, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_015', name: '🧠 語感初顯', desc: '在遊戲中累計答對 7 題', r: 25, target: 7, cur: function(d) { return d.totalCorrect || 0; } },

            // === 【中等常規組：獎勵 30 ~ 150 金幣】 ===
            { id: 'a_016', name: '🧠 八向通達', desc: '在遊戲中累計答對 8 題', r: 30, target: 8, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_017', name: '🧠 長線學習', desc: '在遊戲中累計答對 9 題', r: 30, target: 9, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_018', name: '🎯 語文熟手', desc: '在遊戲中累計答對 10 題', r: 35, target: 10, cur: function(d) { return d.totalCorrect || 0; } },
            { id: 'a_019', name: '📅 簽到狂熱', desc: '不限天數累計完成簽到 4 次', r: 35, target: 4, cur: function(d) { return d.totalCheckins || 0; } },
            { id: 'a_020', name: '📅 五大三粗', desc: '不限天數累計完成簽到 5 次', r: 40, target: 5, cur: function(d) { return d.totalCheckins || 0; } },
            { id: 'a_021', name: '🔥 火熱連擊', desc: '達成連續登入簽到 4 天', r: 40, target: 4, cur: function(d) { return d.streak || 0; } },

        // --- 2. 編輯與 A4 自動分頁核心 ---
        function loadNote(name) {
            if(!name) return; 
            curN = name; 
            pgContainer.innerHTML = "";
            
            if (gameMode) {
                gameMode = false; 
                document.getElementById('game-center').style.display = 'none';
                pgContainer.style.display = 'flex';
                let tb = document.getElementById('toolbar'); 
                tb.style.pointerEvents = 'auto'; 
                tb.style.opacity = '1';
            }

            if(!db.notes[name]) {
                db.notes[name] = [""];
            }
            
            for (let i = 0; i < db.notes[name].length; i++) {
                createPage(db.notes[name][i], i + 1);
            }
            applyActiveTheme(); 
            renderSB();
        }

        function createPage(html, num) {
            const p = document.createElement('div');
            p.className = 'paper-page'; 
            p.contentEditable = "true"; 
            p.spellcheck = false;
            p.setAttribute('data-page', num); 
            p.innerHTML = html;
            p.oninput = function() { 
                adjustPages(); 
                triggerAutosave(); 
            };
            pgContainer.appendChild(p); 
            return p;
        }

        function adjustPages() {
            // 1. 先記錄當前使用者的游標精準位置與焦點頁面，防止搬移時游標消失
            const sel = window.getSelection();
            let savedRange = null;
            let activePageIndex = -1;
            const pgsBefore = Array.from(document.querySelectorAll('.paper-page'));
            
            if (sel.rangeCount > 0 && document.activeElement && document.activeElement.classList.contains('paper-page')) {
                savedRange = sel.getRangeAt(0).cloneRange();
                activePageIndex = pgsBefore.indexOf(document.activeElement);
            }

            const maxH = 1160; 
            let pgs = Array.from(document.querySelectorAll('.paper-page'));
            
            for (let i = 0; i < pgs.length; i++) {
                let p = pgs[i];
                
                // 狀況 A：內容向下溢出，安全推進
                while (p.scrollHeight > maxH && p.childNodes.length > 0) {
                    let next = p.nextElementSibling;
                    if (!next) { 
                        next = createPage("", pgs.length + 1); 
                        pgs.push(next);
                    }
                    
                    let nodeToMove = p.lastChild;
                    if (!nodeToMove) break;
                    
                    if (nodeToMove.nodeType === 1 && (nodeToMove.tagName === 'UL' || nodeToMove.tagName === 'OL') && nodeToMove.children.length > 1) {
                        let lastLi = nodeToMove.lastElementChild;
                        let targetList = next.firstChild;
                        
                        if (!targetList || targetList.tagName !== nodeToMove.tagName) {
                            targetList = document.createElement(nodeToMove.tagName);
                            next.insertBefore(targetList, next.firstChild);
                        }
                        targetList.insertBefore(lastLi, targetList.firstChild);
                        if (nodeToMove.children.length === 0) { nodeToMove.remove(); }
                    } else {
                        next.insertBefore(nodeToMove, next.firstChild);
                    }
                }
                
                // 狀況 B：內容變少，高容錯深度解構回收機制
                let next = p.nextElementSibling;
                while (next && next.childNodes.length > 0) {
                    let firstChild = next.firstChild;
                    if (!firstChild) break;

                    // 1. 深度清單融合：如果是同種類清單，且裡面有子項目，一項一項拉上來試探
                    if (firstChild.nodeType === 1 && (firstChild.tagName === 'UL' || firstChild.tagName === 'OL')) {
                        if (firstChild.children.length > 0) {
                            // 如果前一頁最後一個節點不是清單，就幫它建個新殼來接
                            if (!p.lastChild || p.lastChild.tagName !== firstChild.tagName) {
                                let newShell = document.createElement(firstChild.tagName);
                                p.appendChild(newShell);
                            }
                            // 逐項拉上來試探
                            p.lastChild.appendChild(firstChild.firstChild);
                        }
                        
                        // 2. 溢出對比（加入 5px 緩衝區防死鎖）
                        if (p.scrollHeight > maxH + 5) {
                            // 超出容量了，把剛剛拉上去的最後一個子項目無條件吐回第二頁開頭
                            if (p.lastChild && (p.lastChild.tagName === 'UL' || p.lastChild.tagName === 'OL') && p.lastChild.children.length > 0) {
                                firstChild.insertBefore(p.lastChild.lastElementChild, firstChild.firstChild);
                                // 如果前一頁的殼空了，順便移除
                                if (p.lastChild.children.length === 0) { p.lastChild.remove(); }
                            }
                            break; // 終止回收
                        }

                        // 如果第二頁的舊清單外殼已經被完全吸乾洗空，則銷毀外殼
                        if (firstChild.children.length === 0) { 
                            firstChild.remove(); 
                        }
                    } else {
                        // 普通段落回收
                        p.appendChild(firstChild);
                        if (p.scrollHeight > maxH + 5) {
                            next.insertBefore(p.lastChild, next.firstChild);
                            break;
                        }
                    }
                    
                    // 完全吸空的乾淨頁面進行自動銷毀
                    if (next.innerHTML.trim() === "" && document.querySelectorAll('.paper-page').length > 1) {
                        next.remove();
                        pgs = Array.from(document.querySelectorAll('.paper-page'));
                        next = p.nextElementSibling;
                    }
                }
            }

            // 3. 重新校對並刷新所有人造 A4 頁碼
            const finalPages = document.querySelectorAll('.paper-page');
            for (let idx = 0; idx < finalPages.length; idx++) {
                finalPages[idx].setAttribute('data-page', idx + 1);
            }

            // 4. 還原游標焦點
            if (savedRange && activePageIndex !== -1 && finalPages[activePageIndex]) {
                try {
                    finalPages[activePageIndex].focus();
                    if (document.body.contains(savedRange.startContainer)) {
                        sel.removeAllRanges();
                        sel.addRange(savedRange);
                    }
                } catch (e) {
                    console.warn("游標重塑中:", e);
                }
            }
            applyActiveTheme();
        }

        function triggerAutosave() {
            clearTimeout(autosaveTimer);
            const btn = document.getElementById('save-status'); 
            btn.innerText = "編輯中..."; 
            btn.style.background = "#d97706";
            autosaveTimer = setTimeout(function() { 
                save(true); 
                btn.innerText = "儲存內容"; 
                btn.style.background = "var(--primary)"; 
            }, 1500);
        }

        function save(silent = false) {
            if (!curN) return;
            const pages = Array.from(document.querySelectorAll('.paper-page'));
            db.notes[curN] = pages.map(function(p) { return p.innerHTML; });
            localStorage.setItem('dutch_studio_drag_fix', JSON.stringify(db));
            if (!silent) {
                alert("手動儲存成功！");
            }
        }
        // --- 3. 側邊欄、搜尋與拖曳排序 (不簡化版) ---
        function renderSB() {
            let explorerHTML = "";
            for (let i = 0; i < db.folders.length; i++) {
                let f = db.folders[i];
                let arrowSign = f.open ? '▼' : '▶';
                let displayStyle = f.open ? 'block' : 'none';
                
                let notesHTML = "";
                for (let j = 0; j < f.notes.length; j++) {
                    let n = f.notes[j];
                    let activeClass = (n === curN) ? 'active' : '';
                    
                    // 修改亮點：依照需求保留小章節獨立 🗑️ 垃圾桶按鍵
                    notesHTML += `
                        <div class="n-item ${activeClass}" draggable="true" ondragstart="drag(event, '${n}', ${f.id})" onclick="loadNote('${n}')" style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;">
                            <div style="display:flex;align-items:center;gap:6px;flex:1;overflow:hidden;">
                                <span>📄</span>
                                <input class="n-input" value="${n}" onchange="renN('${n}', this.value)" onclick="event.stopPropagation()">
                            </div>
                            <button class="btn-del" onclick="delN(${f.id}, '${n}', event)" title="刪除此小章節">🗑️</button>
                        </div>
                    `;
                }

                explorerHTML += `
                    <div class="f-box" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="drop(event, ${f.id})">
                        <div class="f-head">
                            <span onclick="toggleF(${f.id})" style="cursor:pointer;color:var(--primary)">${arrowSign}</span>
                            <input class="f-input" value="${f.name}" onchange="renF(${f.id}, this.value)">
                            <button class="btn-del" onclick="delF(${f.id})">🗑️</button>
                        </div>
                        <div class="n-list" style="display: ${displayStyle}">
                            ${notesHTML}
                        </div>
                    </div>
                `;
            }
            document.getElementById('explorer').innerHTML = explorerHTML;
        }

        function drag(e, n, fId) { 
            dragN = n; 
            dragF = fId; 
        }

        function drop(e, targetFId) {
            e.preventDefault(); 
            let boxes = document.querySelectorAll('.f-box');
            for (let i = 0; i < boxes.length; i++) {
                boxes[i].classList.remove('drag-over');
            }
            if (dragF === targetFId) return;
            
            let sourceFolder = null;
            let targetFolder = null;
            for (let i = 0; i < db.folders.length; i++) {
                if (db.folders[i].id === dragF) sourceFolder = db.folders[i];
                if (db.folders[i].id === targetFId) targetFolder = db.folders[i];
            }
            
            if (sourceFolder && targetFolder) { 
                sourceFolder.notes = sourceFolder.notes.filter(function(x) { return x !== dragN; }); 
                targetFolder.notes.push(dragN); 
                save(true); 
                renderSB(); 
            }
        }

        function searchNote(q) {
            let items = document.querySelectorAll('.n-item');
            for (let i = 0; i < items.length; i++) {
                let inputVal = items[i].querySelector('.n-input').value.toLowerCase();
                let isMatch = inputVal.includes(q.toLowerCase());
                items[i].style.display = isMatch ? 'flex' : 'none';
            }
        }

        function addFolder() { 
            db.folders.push({ id: Date.now(), name: "新資料夾", notes: [], open: true }); 
            save(true); 
            renderSB(); 
        }

        function addNote() {
            if (db.folders.length === 0) {
                addFolder();
            }
            let n = "新筆記 " + Date.now().toString().slice(-4); 
            db.folders[0].notes.push(n); 
            db.notes[n] = [""];
            save(true); 
            loadNote(n);
        }

        function renF(id, v) { 
            for (let i = 0; i < db.folders.length; i++) {
                if (db.folders[i].id === id) {
                    db.folders[i].name = v;
                }
            }
            save(true); 
        }

        function renN(old, v) {
            if (!v || old === v || db.notes[v]) return;
            db.notes[v] = db.notes[old]; 
            delete db.notes[old];
            
            for (let i = 0; i < db.folders.length; i++) {
                let f = db.folders[i];
                let idx = f.notes.indexOf(old); 
                if (idx !== -1) {
                    f.notes[idx] = v;
                }
            }
            curN = v; 
            save(true); 
            renderSB();
        }

        function delF(id) { 
            if (confirm("確定刪除此資料夾與所有筆記？")) { 
                db.folders = db.folders.filter(function(x) { return x.id !== id; }); 
                save(true); 
                renderSB(); 
            }
        }

        function delN(fId, n, e) { 
            e.stopPropagation(); 
            if (confirm(`確定刪除筆記 [${n}]？`)) { 
                let folder = db.folders.find(function(x) { return x.id === fId; });
                if (folder) {
                    folder.notes = folder.notes.filter(function(x) { return x !== n; });
                }
                delete db.notes[n]; 
                save(true); 
                renderSB(); 
            } 
        }

        function toggleF(id) { 
            let folder = db.folders.find(function(x) { return x.id === id; });
            if (folder) {
                folder.open = !folder.open;
            }
            renderSB(); 
        }

        function exportJSON() { 
            let a = document.createElement('a'); 
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); 
            a.download = "MyNoteBackup.json"; 
            a.click(); 
        }

        function exec(c, v = null) { 
            document.execCommand(c, false, v); 
            adjustPages(); 
            triggerAutosave(); 
        }

        function insertTable() { 
            let r = prompt("行數:", "3");
            let c = prompt("列數:", "2"); 
            if (r && c) { 
                let rowsHTML = "";
                let rowCount = parseInt(r);
                let colCount = parseInt(c);
                for (let i = 0; i < rowCount; i++) {
                    let colsHTML = "";
                    for (let j = 0; j < colCount; j++) {
                        colsHTML += '<td>&nbsp;</td>';
                    }
                    rowsHTML += `<tr>${colsHTML}</tr>`;
                }
                exec('insertHTML', `<table>${rowsHTML}</table><p>&nbsp;</p>`); 
            } 
        }

        // --- 4. 語音朗讀發音與劃線智慧泡泡 ---
        function initUI() {
            document.addEventListener('mouseup', function(e) {
                let sel = window.getSelection();
                let txt = sel.toString().trim();
                if (txt && pgContainer.contains(e.target)) {
                    selectedText = txt; 
                    let r = sel.getRangeAt(0).getBoundingClientRect();
                    bubble.style.display = 'flex'; 
                    bubble.style.left = `${r.left + window.scrollX + r.width/2 - 60}px`; 
                    bubble.style.top = `${r.top + window.scrollY - 55}px`;
                } else if (!bubble.contains(e.target)) {
                    hideBubble();
                }
            });

            document.getElementById('btn-speak').onclick = function() {
                window.speechSynthesis.cancel(); 
                let u = new SpeechSynthesisUtterance(selectedText);
                let isKo = /[\uAC00-\uD7AF]/.test(selectedText);
                
                u.lang = isKo ? 'ko-KR' : 'nl-NL'; 
                u.pitch = isKo ? 1.25 : 1.0;
                
                let vs = window.speechSynthesis.getVoices();
                let f = vs.find(function(v) {
                    return v.lang.startsWith(u.lang) && (v.name.includes('Google') || v.name.includes('Female'));
                });
                if (f) u.voice = f; 
                window.speechSynthesis.speak(u);
            };
        }

        function hideBubble() { 
            bubble.style.display = 'none'; 
        }

      
        // --- 5. 語言遊戲中心大廳主控模組 (修正遮擋解鎖版) ---
        function toggleGameCenter() {
            gameMode = !gameMode;
            
            // 抓取會產生隱形遮擋的畫布容器
            const canvasEl = document.getElementById('canvas');
            const gcEl = document.getElementById('game-center');
            const pagesEl = document.getElementById('pages');
            
            if (gameMode) {
                // 1. 開啟遊戲中心
                gcEl.style.display = 'block';
                pagesEl.style.display = 'none';
                
                // 【關鍵修復】拿掉大畫布的隱形內距，讓滑鼠可以順利穿透、點擊到按鈕！
                canvasEl.style.padding = "20px 0"; 
                
                initGameCenter();
            } else {
                // 2. 關閉遊戲中心，回歸 A4 筆記

               function initGameCenter() {

        // --- 新增：語言遊戲中心題庫單元硬碟級刪除執行函式 ---
        function delGameChapter(chapterName, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            if (confirm(`⚠️ 確定要永久刪除【${chapterName}】這個題庫單元與內部的所有題目嗎？`)) {
                if (gameData.questions && gameData.questions[chapterName]) {
                    delete gameData.questions[chapterName];
                }
                saveGame();
                initGameCenter();
                alert(`🗑️ 題庫單元【${chapterName}】已成功從硬碟內安全移除！`);
             } 
        }



        function doCheckin() {
            let today = new Date().toISOString().slice(0, 10); 
            if (gameData.checkinLog[today]) return;
            
            let yest = new Date(); 
            yest.setDate(yest.getDate() - 1); 
            let yestStr = yest.toISOString().slice(0, 10);
            
            if (gameData.lastCheckinDate === yestStr) {
                gameData.streak = gameData.streak + 1;
            } else {
                gameData.streak = 1;
            }
            
            gameData.checkinLog[today] = true; 
            gameData.lastCheckinDate = today; 
            gameData.totalCheckins++; 
            gameData.coins += 50;
            
            saveGame(); 
            initGameCenter(); 
            alert(`🌟 簽到成功！獲得金幣 50 枚！\n目前連續學習天數：${gameData.streak} 天！🔥`);
        }

        function importQuestions() {
            try {
                let lines = document.getElementById('import-json-area').value.split('\n');
                let currentChapter = "預設單元";
                
                for (let i = 0; i < lines.length; i++) {
                    let text = lines[i].trim(); 
                    if (!text) continue;
                    
                    if (!text.includes('|')) {
                        currentChapter = text; 
                        if (!gameData.questions[currentChapter]) {
                            gameData.questions[currentChapter] = [];
                        }
                        continue;
                    }
                    
                    let parts = text.split('|').map(function(p) { return p.trim(); });
                    let qText = parts[0];
                    let answer = parts[1];
                    let options = parts.slice(2);
                    
                    if (options.length > 0) {
                        if (!options.includes(answer)) {
                            options.unshift(answer);
                        }
                        options.sort(function() { return Math.random() - 0.5; });
                        gameData.questions[currentChapter].push({ type: 'choice', q: qText, options: options, a: answer });
                    } else {
                        gameData.questions[currentChapter].push({ type: 'fill', q: qText, a: answer });
                    }
                }
                saveGame(); 
                initGameCenter(); 
                switchTab('play'); 
                alert("極簡化題庫編譯並匯入成功！");
            } catch (e) { 
                alert("解譯失敗，請確認格式！"); 
            }
        }

        function updateWrongBookUI() {
            let totalWrong = (gameData.wrongAnswers || []).length;
            document.getElementById('wrong-count').innerText = totalWrong;
            document.getElementById('wrong-notice-num').innerText = totalWrong;
            
            let lockText = document.getElementById('wrong-lock-text');
            let startBtn = document.getElementById('btn-start-wrong');
            
            if (totalWrong >= 10) {
                lockText.innerHTML = `🎉 <b>解鎖成功！</b> 錯題庫能量已滿，隨時可以發動複清模式。`; 
                startBtn.style.display = 'block';
            } else {
                lockText.innerHTML = `⚠️ 錯題本必須累積滿 10 題以上，才能解鎖開啟地獄複習模式！（目前還差 ${10 - totalWrong} 題）`; 
                startBtn.style.display = 'none';
            }
        }
        // --- 6. 任務進度條 + 手動領取獎勵機制 (保留完整邏輯不簡化) ---
        function renderAchieveList() {
            if (!gameData.unlockedAchievements) { gameData.unlockedAchievements = {}; }
            if (!gameData.claimedAchievements) { gameData.claimedAchievements = {}; }

            // 檢查並判定解鎖條件（不自動撥發金幣，改為手動領取）
            for (let i = 0; i < ACHIEVEMENTS.length; i++) {
                let a = ACHIEVEMENTS[i];
                let currentProgress = a.cur(gameData);
                if (!gameData.unlockedAchievements[a.id] && currentProgress >= a.target) {
                    gameData.unlockedAchievements[a.id] = true;
                }
            }
            saveGame();

            let achieveHTML = "";
            for (let i = 0; i < ACHIEVEMENTS.length; i++) {
                let a = ACHIEVEMENTS[i];
                let done = gameData.unlockedAchievements[a.id];
                let claimed = gameData.claimedAchievements[a.id];
                let curVal = a.cur(gameData);
                if (curVal > a.target) {
                    curVal = a.target; // 進度上限鎖定
                }
                let pct = (curVal / a.target) * 100;
                
                let btnHTML = "";
                if (claimed) {
                    btnHTML = `<button class="btn-sb" style="background:#475569;max-width:95px;cursor:default;" disabled>已領取</button>`;
                } else if (done) {
                    btnHTML = `<button class="btn-sb" style="background:#10b981;max-width:95px;" onclick="claimReward('${a.id}', ${a.r})">🎁 領取獎勵</button>`;
                } else {
                    btnHTML = `<button class="btn-sb" style="background:#334155;max-width:95px;cursor:not-allowed;" disabled>未達成</button>`;
                }

                achieveHTML += `
                    <div style="display:flex;flex-direction:column;background:rgba(255,255,255,0.02);border:1px solid ${done?'#10b981':'#334155'};padding:12px;border-radius:8px;gap:8px;">
                        <div style="display:flex;align-items:center;justify-content:space-between;">
                            <div>
                                <div style="font-weight:bold;color:${done?'#10b981':'white'}">${done?'🏅':'🔒'} ${a.name}</div>
                                <div style="font-size:0.8rem;color:#64748b">${a.desc} (💰+${a.r})</div>
                            </div>
                            <div style="width:105px;">${btnHTML}</div>
                        </div>
                        <!-- 任務進度條容器 (全配置尺寸長度統一) -->
                        <div style="width:100%;background:rgba(0,0,0,0.3);height:15px;border-radius:10px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.05);">
                            <div style="width:${pct}%;background:linear-gradient(90deg, var(--primary), #f59e0b);height:100%;transition:width 0.4s;"></div>
                            <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.7rem;font-weight:bold;color:white;text-shadow:1px 1px 1px #000;">
                                ${curVal} / ${a.target}
                            </span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('achievement-list').innerHTML = achieveHTML;
        }

        function claimReward(id, reward) {
            if (gameData.claimedAchievements[id]) return;
            gameData.claimedAchievements[id] = true;
            gameData.coins += reward;
            saveGame();
            document.getElementById('user-coins').innerText = gameData.coins;
            renderAchieveList();
            
            let achievementObj = ACHIEVEMENTS.find(function(x) { return x.id === id; });
            alert(`💰 成功手動領取：【${achievementObj.name}】獎勵金幣 ${reward} 枚！`);
        }

        // --- 7. 商城外觀開關與消耗品道具庫 (不簡化版) ---
        function renderShopList() {
            let shopHTML = "";
            let keys = Object.keys(SHOP);
            
            for (let i = 0; i < keys.length; i++) {
                let k = keys[i];
                let s = SHOP[k];
                let owns = gameData.items[k] || 0;
                let isThemeBought = gameData.unlockedThemes[k];
                let isActive = (gameData.currentTheme === k);
                
                let btnHTML = "";
                if (s.t) {
                    if (isThemeBought) {
                        // 依照需求：黑曜石與櫻花粉等外觀解鎖後，按鈕具有啟用與關閉的開關切換鍵
                        if (isActive) {

                        } else {
                            btnHTML = `<button class="btn-sb" style="background:#2563eb;" onclick="toggleTheme('${k}')">開啟啟用 ○</button>`;
                        }

                }

                    subText = `<div style="font-size:0.75rem;color:#34d399;">目前背包存量: ${owns} 個</div>`;
                }

                shopHTML += `

            }
            document.getElementById('shop-item-list').innerHTML = shopHTML;
        }

        function buyItem(k) {
            let s = SHOP[k];
            if (gameData.coins < s.p) {
                alert("金幣不夠！快去每日簽到或玩遊戲賺取吧！");
                return;
            }
            gameData.coins -= s.p;
            if (s.t) {
                gameData.unlockedThemes[k] = true;
            } else {
                gameData.items[k] = (gameData.items[k] || 0) + 1;
            }
            saveGame();
            document.getElementById('user-coins').innerText = gameData.coins;
            renderShopList();
            alert("商品購買成功！");
        }

        function toggleTheme(k) {
            // 切換邏輯：如果目前是啟用的，就關閉（切回預設白紙），否則就啟用
            if (gameData.currentTheme === k) {
                gameData.currentTheme = 'default';
            } else {
                gameData.currentTheme = k;
            }
            saveGame();
            applyActiveTheme();
            renderShopList();
        }

        // 修改幾點5：答題核心結算 (同步為加成券、磁鐵、咖啡、合約、防火牆進行效果核算)
        function judgeAnswerResult(isRight) {
            let curQuestionItem = currentPool[curQIdx];
            
            if (isRight) {
                let baseScore = 10;
                let baseCoins = 10;
                
                // 1. 檢查狂暴黑咖啡加成 (+20)
                if (gameData.activeCoffee) { baseCoins += 20; }
                // 2. 檢查磁吸金石狀態 (雙倍)
                if (gameData.magnetTurns && gameData.magnetTurns > 0) { 
                    baseCoins = baseCoins * 2; 
                    gameData.magnetTurns--; 
                    if(gameData.magnetTurns === 0) { alert("🧲 磁吸金石的雙倍磁場效果已消耗完畢！"); }
                }
                // 3. 檢查金幣加成券 (總額雙倍)
                if (gameData.activeCoinBooster) { 
                    baseCoins = baseCoins * 2; gameData.activeCoinBooster = false; 
                    alert("🪙 金幣加成券效果已在背景安全結算完畢！");
                }

                score += baseScore; 
                gameData.coins += baseCoins; 
                gameData.totalCorrect++;
                
                if (isWrongReviewMode) {
                    gameData.wrongAnswers = gameData.wrongAnswers.filter(function(x) { return x.q !== curQuestionItem.q; });
                }
            } else {
                // 答錯時：優先檢查防火牆 (Shield) 是否有架設
                if (gameData.activeShield) {
                    gameData.activeShield = false;
                    alert("🛡️ 防火牆完美抵消！本次答錯免除扣分且不收入錯題本！");
                } else {
                    // 檢查黑卡合約免扣金幣狀態
                    if (gameData.contractTurns && gameData.contractTurns > 0) {
                        gameData.contractTurns--;
                        alert(`📜 菁英黑卡發動豁免！本次不扣除金幣（合約剩餘 ${gameData.contractTurns} 次）`);
                    } else {
                        // 正常答錯扣處罰金幣
                        if (gameData.coins >= 5) gameData.coins -= 5;
                    }

                    // 連擊檢查 (無 Combo Guard 時才中斷)
                    if (gameData.activeComboGuard) {
                        gameData.activeComboGuard = false;
                        alert("🔥 連擊保護盾碎裂！成功留住您當前的 Combo 倍率紀錄！");
                    }

                    // 深拷貝收入死靈錯題本
                    if (!isWrongReviewMode) {
                        let alreadyIn = gameData.wrongAnswers.some(function(x) { return x.q === curQuestionItem.q; });
                        if (!alreadyIn) {
                            gameData.wrongAnswers.push(JSON.parse(JSON.stringify(curQuestionItem)));
                        }
                    }
                }
            }
            saveGame(); 
            document.getElementById('g-next-btn').style.display = 'block';
            refreshGameHeaderUI();
        }

                        currentPool = currentPool.concat(gameData.questions[key]);

        function ansChoice(chosen, correct, btn) {
            let opts = document.querySelectorAll('.g-opt');

                opts[i].disabled = true;
            }
            let right = (chosen === correct);

        // 補回最核心的網頁初始化啟動載入函式
        window.onload = function() { 
            if (typeof window.speechSynthesis !== 'undefined') {
                window.speechSynthesis.getVoices(); 
            }
            renderSB(); 
            loadNote(curN); 
            initUI(); 
            initGameCenter(); 
        };

    </script>
</body>
</html>
